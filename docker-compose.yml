services:
  php74:
    image: vtkhang/appenv:php74
    build:
      context: .
      dockerfile: php74.Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    container_name: php74-apache
    ports:
      - "8074:80"
    volumes:
      - ./src:/var/www/html
      - ./vhosts:/var/www/vhosts
      - ${HOME}/repos/src:${HOME}/repos/src
      - gemini-settings:/home/www-data/.gemini
      - opencode-settings:/home/www-data/.opencode
      - droid-settings:/home/www-data/.droid
      - git-settings:/home/www-data/.config/git
      - ssh-settings:/home/www-data/.ssh
    restart: always

  php82:
    image: vtkhang/appenv:php82
    build:
      context: .
      dockerfile: php82.Dockerfile
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    container_name: php82-apache
    ports:
      - "8082:80"
    volumes:
      - ./src:/var/www/html
      - ./vhosts:/var/www/vhosts
      - ${HOME}/repos/src:${HOME}/repos/src
      - gemini-settings:/home/www-data/.gemini
      - opencode-settings:/home/www-data/.opencode
      - droid-settings:/home/www-data/.droid
      - git-settings:/home/www-data/.config/git
      - ssh-settings:/home/www-data/.ssh
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: mariadb
      # This helps fix the "Failed to set session cookie" error behind a proxy
      PMA_ABSOLUTE_URI: ./
      # Increase upload limits for large imports
      UPLOAD_LIMIT: 512M
      MEMORY_LIMIT: 512M
      MAX_EXECUTION_TIME: 600
    ports:
      - "8080:80"
    restart: always

  dbgate:
    image: dbgate/dbgate:latest
    container_name: dbgate
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - dbgate-data:/root/.dbgate

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  mariadb:
    image: mariadb:10.4.21
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: app_db
      MARIADB_USER: db_user
      MARIADB_PASSWORD: db_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: redis-sessions
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  caddy:
    build:
      context: .
      dockerfile: caddy.Dockerfile
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./selfsigned.crt:/etc/caddy/selfsigned.crt
      - ./selfsigned.key:/etc/caddy/selfsigned.key
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - php82
      - php74
      - phpmyadmin
      - dbgate
      - mailhog
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  dbgate-data:
  mariadb-data:
  caddy-data:
  caddy-config:
  redis-data:
  gemini-settings:
  opencode-settings:
  droid-settings:
  git-settings:
  ssh-settings:
